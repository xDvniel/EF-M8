<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

  <h1>Login</h1>

  <form id="loginForm">
    <input type="text" id="loginUsername" placeholder="Usuario" required>
    <br><br>
    <input type="password" id="loginPassword" placeholder="Contraseña" required>
    <br><br>
    <button type="submit">Iniciar sesión</button>
  </form>

  <p id="loginMessage"></p>

  <button id="perfilBtn">Ver perfil</button>
  <pre id="perfilData"></pre>

  <br>
  <a href="/register.html">Ir a Registro</a>

  <script src="client.js"></script>

</body>
</html>
